<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d" />
      <stop offset="40%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#be123c" />
    </linearGradient>
    <linearGradient id="highlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#fde68a" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Ambient glow behind the logo -->
  <circle cx="50" cy="50" r="30" fill="#f97316" opacity="0.25" filter="url(#glow)" />
  
  <!-- Background glow spark -->
  <path d="M 50 10 Q 50 50 90 50 Q 50 50 50 90 Q 50 50 10 50 Q 50 50 50 10 Z" fill="url(#brand)" opacity="0.5" filter="url(#glow)"/>
  
  <!-- Main spark shape -->
  <path d="M 50 5 Q 50 50 95 50 Q 50 50 50 95 Q 50 50 5 50 Q 50 50 50 5 Z" fill="url(#brand)" />
  
  <!-- Inner bright spark core -->
  <path d="M 50 20 Q 50 50 80 50 Q 50 50 50 80 Q 50 50 20 50 Q 50 50 50 20 Z" fill="url(#highlight)" opacity="0.9" />
</svg>
